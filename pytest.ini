[pytest]
# Marcadores registrados
markers =
    e2e: testes end-to-end (requerem servidor rodando + credenciais de teste)
    slow: testes lentos (>5s)
    smoke: testes de fumaça para validação rápida

# Configuração do pytest-playwright
# Base URL pode ser sobrescrita via FLASK_TEST_URL ou --base-url
# Ex: pytest tests/e2e --base-url http://staging.example.com

# Ignorar pasta e2e por padrão (requer servidor externo)
# Para rodar e2e: pytest tests/e2e --base-url http://127.0.0.1:5000
addopts = --ignore=tests/e2e

# Timeout padrão dos testes (segundos)
timeout = 30
