[pytest]
# Marcadores registrados
markers =
    e2e: testes end-to-end (requerem servidor rodando + credenciais de teste)
    slow: testes lentos (>5s)
    smoke: testes de fumaça para validação rápida
    regression: testes de regressão
    api: testes de contrato de API

# Ignorar pasta e2e por padrão (requer servidor externo)
# Para rodar e2e: pytest tests/e2e --base-url http://127.0.0.1:5000
addopts =
    --ignore=tests/e2e
    --cov=app
    --cov-report=term-missing:skip-covered

# Timeout padrão dos testes (segundos)
timeout = 30

# Suprimir warnings de bibliotecas de terceiros (não do código da aplicação)
filterwarnings =
    ignore::DeprecationWarning:google.*
    ignore::DeprecationWarning:firebase_admin.*
    ignore::DeprecationWarning:pkg_resources.*
