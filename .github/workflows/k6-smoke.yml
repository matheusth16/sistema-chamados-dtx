name: k6 Smoke Test

on:
  # Smoke semanal automatizado — toda segunda-feira às 08h BRT (11h UTC)
  schedule:
    - cron: "0 11 * * 1"
  # Trigger manual (dispatch) — rodar antes do go-live ou após deploy
  workflow_dispatch:
    inputs:
      base_url:
        description: "URL base do serviço (ex.: https://sistema-chamados-xxx-uc.a.run.app)"
        required: true
        type: string
      test_type:
        description: "Tipo de teste"
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - stress

jobs:
  k6-test:
    # schedule não tem inputs — usa smoke por padrão
    name: ${{ inputs.test_type || 'smoke' }} test
    runs-on: ubuntu-latest
    env:
      # dispatch manual: usa inputs.base_url; schedule: usa secret PRODUCTION_URL
      BASE_URL: ${{ inputs.base_url || secrets.PRODUCTION_URL || '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Verificar URL configurada
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "⚠️ BASE_URL não configurada — defina PRODUCTION_URL nos secrets do repositório ou passe base_url no dispatch."
            exit 1
          fi
          echo "Testando: $BASE_URL"

      - name: Setup k6
        uses: grafana/k6-action@v0.3.1

      - name: Run smoke test
        if: ${{ inputs.test_type != 'stress' }}
        run: |
          k6 run \
            -e BASE_URL=$BASE_URL \
            --out json=k6-results.json \
            scripts/qa/k6/smoke.js

      - name: Run stress test
        if: inputs.test_type == 'stress'
        run: |
          k6 run \
            -e BASE_URL=$BASE_URL \
            --out json=k6-results.json \
            scripts/qa/k6/stress.js

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results-${{ inputs.test_type || 'smoke' }}-${{ github.run_id }}
          path: k6-results.json
          retention-days: 7
