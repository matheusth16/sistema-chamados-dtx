name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    name: Lint, Testes e Segurança
    runs-on: ubuntu-latest

    env:
      # Variáveis mínimas para o app Flask subir em modo de teste
      FLASK_ENV: testing
      SECRET_KEY: ci-test-secret-key
      WTF_CSRF_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Instalar dependências
        run: pip install -r requirements-dev.txt pip-audit

      # ── Lint e format ──────────────────────────────────────────────────────
      - name: Ruff — lint
        run: ruff check app/ tests/

      - name: Ruff — format
        run: ruff format --check app/ tests/

      # ── Segurança ──────────────────────────────────────────────────────────
      - name: Bandit — SAST
        run: bandit -r app/ -ll -q

      - name: pip-audit — vulnerabilidades em dependências
        run: pip-audit -r requirements.txt --progress-spinner off

      # ── Testes com cobertura ───────────────────────────────────────────────
      - name: Pytest — suite completa com gate de cobertura
        run: |
          pytest --tb=short -q \
            --cov=app \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70

      - name: Upload relatório de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
