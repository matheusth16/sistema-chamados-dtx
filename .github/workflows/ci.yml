tps://accounts.google.com/o/oauth2/auth", "token_uri": "https://oauth2.googleapis.com/token", "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs", "client_x509_cert_url": "https://www.googleapis.com/robot/v1/metadata/x509/ci-fake%40ci-fake-project.iam.gserviceaccount.com", "universe_domain": "googleapis.com"}'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Instalar dependências
        run: pip install -r requirements-dev.txt pip-audit

      # ── Lint e format ──────────────────────────────────────────────────────
      - name: Ruff — lint
        run: ruff check app/ tests/

      - name: Ruff — format
        run: ruff format --check app/ tests/

      # ── Segurança ──────────────────────────────────────────────────────────
      - name: Bandit — SAST
        run: bandit -r app/ -ll -q

      - name: pip-audit — vulnerabilidades em dependências
        run: pip-audit -r requirements.txt --progress-spinner off

      # Gitleaks — scan de segredos. Não-bloqueante (--exit-code=0): só reporta,
      # não falha o CI. Vai acusar a credencial fake do GOOGLE_CREDENTIALS_JSON
      # acima (é uma chave RSA de fixture, não um segredo real) — achado esperado.
      - name: Gitleaks — scan de segredos
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source=/repo --no-banner --exit-code=0 \
            --report-format=sarif --report-path=/repo/gitleaks-report.sarif

      - name: Upload relatório Gitleaks
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-scan-report
          path: gitleaks-report.sarif
          retention-days: 30

      # ── Testes com cobertura ───────────────────────────────────────────────
      - name: Pytest — suite completa com gate de cobertura
        run: |
          pytest --tb=short -q \
            --cov=app \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage.xml \
            --cov-report=json:coverage.json \
            --cov-fail-under=85

      - name: Gate de cobertura por módulo (>= 85%)
        run: python scripts/check_coverage_per_module.py --json-only

      - name: Upload relatório de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
