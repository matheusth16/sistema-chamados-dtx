name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    name: Lint, Testes e Segurança
    runs-on: ubuntu-latest

    env:
      # Variáveis mínimas para o app Flask subir em modo de teste
      FLASK_ENV: testing
      SECRET_KEY: ci-test-secret-key
      WTF_CSRF_ENABLED: "false"
      # Credencial de service account 100% fake (chave RSA gerada só p/ CI, sem
      # acesso a nenhum projeto GCP real) — necessária pq app/database.py chama
      # firestore.client() no import do módulo, antes de qualquer patch de teste
      # poder substituir app.database.db. Sem isso, a simples coleta dos testes
      # falha com DefaultCredentialsError (não há ADC nem credentials.json no runner).
