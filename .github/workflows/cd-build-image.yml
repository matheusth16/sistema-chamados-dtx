name: CD - Build, Push & Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build imagem Docker e publica no GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadados da imagem (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build e push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Login no Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Atualiza o Container App para a imagem nova
        run: |
          # Usa o digest exato (não a tag mutável :latest) e um revision-suffix
          # único por execução — "az containerapp update" com a mesma string de
          # tag não cria revisão nova mesmo que a imagem remota tenha mudado.
          az containerapp update \
            -n sistema-chamados \
            -g rg-sistema-chamados \
            --image ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }} \
            --revision-suffix gh${{ github.run_number }}

      - name: Logout do Azure
        if: always()
        run: az logout
