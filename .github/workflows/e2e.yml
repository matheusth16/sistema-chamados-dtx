      # existir staging de verdade, defina o secret FLASK_TEST_URL e as contas abaixo
      # deixam de ser necessárias (creds reais viriam de secrets, não daqui).
      FLASK_TEST_URL: ${{ secrets.FLASK_TEST_URL || '' }}
      # Contas de teste 100% fake, existem só dentro do stub em memória (ver
      # _fake_usuarios_por_id em tests/e2e/conftest.py) — não são credenciais reais,
      # não têm acesso a nada, por isso ficam em texto puro aqui em vez de em secrets.
      TEST_SOLICITANTE_EMAIL: "e2e.solicitante@dtx.aero"
      TEST_SOLICITANTE_PASSWORD: "E2eTeste2026!"
      TEST_SOLICITANTE_TOTP_SECRET: "5KHQN27VBTA57XJBK5YR5NY4WGXBLVZ5"
      TEST_SUPERVISOR_EMAIL: "e2e.supervisor@dtx.aero"
      TEST_SUPERVISOR_PASSWORD: "E2eTeste2026!"
      TEST_SUPERVISOR_TOTP_SECRET: "I3AK4NH2DG4XQIZTZAGPNNUYGZMNYKFM"
      TEST_ADMIN_EMAIL: "e2e.admin@dtx.aero"
      TEST_ADMIN_PASSWORD: "E2eTeste2026!"
      TEST_ADMIN_TOTP_SECRET: "BTYKKDGWJZGP5Z3TLLPEHMQLQE7W6FMZ"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Instalar dependências Python
        run: pip install -r requirements-dev.txt

      - name: Instalar browsers Playwright
        run: playwright install chromium --with-deps

      - name: Rodar suíte smoke E2E
        run: |
          pytest tests/e2e -m smoke \
            --base-url "${FLASK_TEST_URL:-http://127.0.0.1:5000}" \
            --tb=short -q \
            --no-header \
            --ignore=tests/e2e/test_solicitante.py

      - name: Subir relatório de traces (falhas)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
