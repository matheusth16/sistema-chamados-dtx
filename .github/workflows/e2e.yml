name: E2E Smoke

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  # Permite trigger manual para rodar contra staging
  workflow_dispatch:
    inputs:
      base_url:
        description: "URL do servidor Flask para testes E2E"
        required: false
        default: "http://127.0.0.1:5000"

jobs:
  e2e-smoke:
    name: E2E Smoke Tests (Playwright)
    runs-on: ubuntu-latest
    # Smoke-01/02/03 bloqueiam o merge; testes que exigem credenciais fazem pytest.skip automaticamente.

    env:
      FLASK_ENV: testing
      SECRET_KEY: e2e-test-secret
      WTF_CSRF_ENABLED: "false"
      # FLASK_E2E_STUB=1 ativa o servidor Flask local em thread (sem Firestore real).
      # SMOKE-01/02/03 passam com o stub; SMOKE-04+ fazem pytest.skip por falta de credenciais.
