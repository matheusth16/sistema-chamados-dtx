name: E2E Smoke

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  # Permite trigger manual para rodar contra staging
  workflow_dispatch:
    inputs:
      base_url:
        description: "URL do servidor Flask para testes E2E"
        required: false
        default: "http://127.0.0.1:5000"

jobs:
  e2e-smoke:
    name: E2E Smoke Tests (Playwright)
    runs-on: ubuntu-latest
    # Smoke-01/02/03 bloqueiam o merge; testes que exigem credenciais fazem pytest.skip automaticamente.

    env:
      FLASK_ENV: testing
      SECRET_KEY: e2e-test-secret
      WTF_CSRF_ENABLED: "false"
      # FLASK_E2E_STUB=1 ativa o servidor Flask local em thread (sem Firestore real).
      # SMOKE-01/02/03 passam com o stub; SMOKE-04+ fazem pytest.skip por falta de credenciais.
      FLASK_E2E_STUB: "1"
      FLASK_TEST_URL: ${{ secrets.FLASK_TEST_URL || '' }}
      TEST_SOLICITANTE_EMAIL: ${{ secrets.TEST_SOLICITANTE_EMAIL || '' }}
      TEST_SOLICITANTE_PASSWORD: ${{ secrets.TEST_SOLICITANTE_PASSWORD || '' }}
      TEST_SUPERVISOR_EMAIL: ${{ secrets.TEST_SUPERVISOR_EMAIL || '' }}
      TEST_SUPERVISOR_PASSWORD: ${{ secrets.TEST_SUPERVISOR_PASSWORD || '' }}
      TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL || '' }}
      TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Instalar dependências Python
        run: pip install -r requirements-dev.txt

      - name: Instalar browsers Playwright
        run: playwright install chromium --with-deps

      - name: Rodar suíte smoke E2E
        run: |
          pytest tests/e2e -m smoke \
            --base-url "${FLASK_TEST_URL:-http://127.0.0.1:5000}" \
            --tb=short -q \
            --no-header \
            --ignore=tests/e2e/test_solicitante.py

      - name: Subir relatório de traces (falhas)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
