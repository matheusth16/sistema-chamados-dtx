# Cloud Build — build e deploy automático no Cloud Run
#
# Uso:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions _REGION=southamerica-east1,_SERVICE=sistema-chamados
#
# Ou via trigger automático: Cloud Build > Triggers > conectar repositório
#
# Variáveis de substituição (defina no trigger ou na linha de comando):
#   _REGION: região do Cloud Run (ex.: southamerica-east1, us-central1)
#   _SERVICE: nome do serviço no Cloud Run
#   _IMAGE: (opcional) nome customizado da imagem

substitutions:
  _REGION: southamerica-east1
  _SERVICE: sistema-chamados
  _IMAGE: gcr.io/$PROJECT_ID/${_SERVICE}

steps:
  # 1. Build da imagem Docker
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - --tag
      - "${_IMAGE}:${SHORT_SHA}"
      - --tag
      - "${_IMAGE}:latest"
      - --cache-from
      - "${_IMAGE}:latest"
      - .
    id: build

  # 2. Push das tags para Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "--all-tags", "${_IMAGE}"]
    id: push
    waitFor: [build]

  # 3. Deploy no Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE}"
      - --image
      - "${_IMAGE}:${SHORT_SHA}"
      - --region
      - "${_REGION}"
      - --platform
      - managed
      - --allow-unauthenticated
      - --min-instances
      - "0"
      - --max-instances
      - "3"
      - --memory
      - "512Mi"
      - --cpu
      - "1"
      - --timeout
      - "300"
      - --set-env-vars
      - "FLASK_ENV=production,PYTHONUNBUFFERED=1"
    id: deploy
    waitFor: [push]

  # 4. Smoke test shallow — verifica se o serviço responde após o deploy
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: bash
    args:
      - -c
      - |
        SERVICE_URL=$(gcloud run services describe ${_SERVICE} \
          --region=${_REGION} --format='value(status.url)')
        echo "URL do serviço: $${SERVICE_URL}"
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$${SERVICE_URL}/health")
        echo "Health check shallow: $${HTTP_CODE}"
        if [ "$${HTTP_CODE}" != "200" ]; then
          echo "FALHA: health check retornou $${HTTP_CODE}"
          exit 1
        fi
        echo "Shallow health check OK."
    id: smoke-test
    waitFor: [deploy]

  # 5. Deep health check — verifica conectividade com Firestore e cache
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: bash
    args:
      - -c
      - |
        SERVICE_URL=$(gcloud run services describe ${_SERVICE} \
          --region=${_REGION} --format='value(status.url)')
        echo "Deep health check: $${SERVICE_URL}/health?deep=1"
        RESPONSE=$(curl -s --max-time 15 "$${SERVICE_URL}/health?deep=1")
        echo "Resposta: $${RESPONSE}"
        # Falha se status for degraded ou unavailable
        if echo "$${RESPONSE}" | grep -q '"status": "unavailable"'; then
          echo "FALHA: serviço indisponível após deploy"
          exit 1
        fi
        if echo "$${RESPONSE}" | grep -q '"status": "degraded"'; then
          echo "AVISO: serviço degradado — Firestore ou cache com problema"
          # Não bloqueia deploy (pode ser transiente) — emite aviso
        fi
        echo "Deep health check concluído."
    id: deep-health-check
    waitFor: [smoke-test]

images:
  - "${_IMAGE}:${SHORT_SHA}"
  - "${_IMAGE}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
