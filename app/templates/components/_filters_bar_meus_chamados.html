{# Barra de filtro por RL em "Meus chamados" #}
<form method="GET" action="{{ url_for('main.meus_chamados') }}" class="mt-4">
    <div class="bg-surface-base p-4 rounded-dtx-md border border-surface-border shadow-dtx-sm flex flex-col sm:flex-row gap-4 items-end">
        <div class="flex-1 max-w-xs">
            <label for="filtro-rl-codigo" class="dtx-label">
                {{ t('rl_short') }}
            </label>
            <input type="text"
                   id="filtro-rl-codigo"
                   name="rl_codigo"
                   value="{{ rl_codigo or request.args.get('rl_codigo', '') }}"
                   placeholder="{{ t('rl_code_example') if t else 'Ex.: 045' }}"
                   class="dtx-input h-10">
        </div>
        <input type="hidden" name="status" value="{{ status_filtro or '' }}">
        <div class="flex gap-2">
            <button type="submit"
                    class="inline-flex items-center px-4 py-2 bg-dtx-600 hover:bg-dtx-700 text-white font-medium rounded-dtx-md shadow-dtx-sm transition-colors text-sm">
                {{ t('filter') }}
            </button>
            {% if rl_codigo or request.args.get('rl_codigo') %}
            <a href="{{ url_for('main.meus_chamados', status=status_filtro) }}"
               class="inline-flex items-center px-3 py-2 text-gray-500 hover:text-gray-700 hover:bg-surface-raised font-medium rounded-dtx-md transition-colors text-sm">
                {{ t('clear_filters') }}
            </a>
            {% endif %}
        </div>
    </div>
</form>
