{# Barra de filtro por RL em "Meus chamados" #}
<div class="bento-card">
    <form method="GET" action="{{ url_for('main.meus_chamados') }}">
        <div class="bento-filter-bar">
            <div class="bento-filter-field">
                <label for="filtro-rl-codigo">{{ t('rl_short') }}</label>
                <input type="text"
                       id="filtro-rl-codigo"
                       name="rl_codigo"
                       value="{{ rl_codigo or request.args.get('rl_codigo', '') }}"
                       placeholder="{{ t('rl_code_example') if t else 'Ex.: 045' }}">
            </div>
            <input type="hidden" name="status" value="{{ status_filtro or '' }}">
            <button type="submit" class="bento-btn-primary" style="padding:11px 20px;">{{ t('filter') }}</button>
            {% if rl_codigo or request.args.get('rl_codigo') %}
            <a href="{{ url_for('main.meus_chamados', status=status_filtro) }}" class="bento-btn-ghost">{{ t('clear_filters') }}</a>
            {% endif %}
        </div>
    </form>
</div>
