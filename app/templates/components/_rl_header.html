{# Cabeçalho de grupo por RL — âncora visual de agrupamento (Web Designer) #}
{% if rl %}
<tr class="rl-header-row bg-rose-50/60" data-rl="{{ rl }}">
    <td colspan="{{ colspan|default(9) }}" class="px-5 py-3 text-xs font-black text-rose-800 uppercase tracking-widest">
        <span class="inline-flex items-center gap-2">
            <span class="rl-tag inline-flex w-6 h-6 rounded-md bg-rose-200/80 items-center justify-center text-rose-700 shrink-0" aria-hidden="true">RL</span>
            {{ rl }}
        </span>
    </td>
</tr>
{% endif %}
