{# Barra de filtros do dashboard — search, categoria, status, RL, responsável (Web Designer: touch 44px, foco visível) #}
<form method="GET" action="{{ url_for('main.admin') }}" class="space-y-4" role="search" aria-label="{{ t('search') if t else 'Filtros' }}">
    <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm relative overflow-hidden">
        <div class="absolute left-0 top-0 bottom-0 w-1 bg-indigo-500 rounded-l-2xl" aria-hidden="true"></div>
        <div class="grid grid-cols-1 md:grid-cols-12 gap-5 items-end pl-2">
            <div class="md:col-span-3">
                <label for="filter-search" class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">{{ t('search') }}</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400" aria-hidden="true">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </span>
                    <input id="filter-search" type="text" name="search" value="{{ request.args.get('search', '') }}"
                        placeholder="{{ t('search_placeholder') }}"
                        class="pl-9 block w-full rounded-xl border-gray-200 bg-gray-50 focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 min-h-[44px] sm:text-sm transition-colors outline-none"
                        aria-label="{{ t('search') }}">
                </div>
            </div>
            <div class="md:col-span-2">
                <label for="filter-categoria" class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">{{ t('category') }}</label>
                <select id="filter-categoria" name="categoria"
                    class="block w-full rounded-xl border-gray-200 bg-gray-50 focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 sm:text-sm min-h-[44px] transition-colors px-3 outline-none"
                    aria-label="{{ t('category') }}">
                    <option value="">{{ t('all') }}</option>
                    <option value="Projetos" {% if request.args.get('categoria')=='Projetos' %}selected{% endif %}>{{ t('projects') }}</option>
                    <option value="Nao Aplicavel" {% if request.args.get('categoria')=='Nao Aplicavel' %}selected{% endif %}>{{ t('not_applicable') }}</option>
                </select>
            </div>
            <div class="md:col-span-2">
                <label for="filter-status" class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">{{ t('status') }}</label>
                <select id="filter-status" name="status"
                    class="block w-full rounded-xl border-gray-200 bg-gray-50 focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 sm:text-sm min-h-[44px] transition-colors px-3 outline-none"
                    aria-label="{{ t('status') }}">
                    <option value="">{{ t('all') }}</option>
                    <option value="Aberto" {% if request.args.get('status')=='Aberto' %}selected{% endif %}>{{ t('open') }}</option>
                    <option value="Em Atendimento" {% if request.args.get('status')=='Em Atendimento' %}selected{% endif %}>{{ t('in_progress') }}</option>
                    <option value="Concluído" {% if request.args.get('status')=='Concluído' %}selected{% endif %}>{{ t('completed') }}</option>
                    <option value="Cancelado" {% if request.args.get('status')=='Cancelado' %}selected{% endif %}>{{ t('cancelled') }}</option>
                </select>
            </div>
            <div class="md:col-span-2">
                <label for="filter-rl" class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">{{ t('rl_short') }}</label>
                <input id="filter-rl" type="text" name="rl_codigo"
                    value="{{ request.args.get('rl_codigo', '') }}"
                    placeholder="{{ t('rl_code_example') if t else 'Ex.: 045' }}"
                    class="block w-full rounded-xl border-gray-200 bg-gray-50 focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 sm:text-sm min-h-[44px] transition-colors px-3 outline-none"
                    aria-label="{{ t('rl_short') }}" />
            </div>
            <div class="md:col-span-2">
                <label for="filter-responsavel" class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">{{ t('assigned_to') }}</label>
                <select id="filter-responsavel" name="responsavel"
                    class="block w-full rounded-xl border-gray-200 bg-gray-50 focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 sm:text-sm min-h-[44px] transition-colors px-3 outline-none"
                    aria-label="{{ t('assigned_to') }}">
                    <option value="">{{ t('all') }}</option>
                    {% for nome in lista_responsaveis %}
                    <option value="{{ nome }}" {% if request.args.get('responsavel')==nome %}selected{% endif %}>{{ nome }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="md:col-span-3 flex gap-2 flex-wrap">
                <button type="submit"
                    class="flex-1 min-h-[44px] bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-4 rounded-xl shadow-sm transition-colors flex items-center justify-center gap-2 focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-indigo-500">
                    <span>{{ t('filter') }}</span>
                </button>
                <a href="{{ url_for('main.admin') }}"
                    class="bg-gray-50 hover:bg-gray-200 text-gray-500 hover:text-gray-700 font-bold min-w-[44px] min-h-[44px] w-11 rounded-xl flex items-center justify-center transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-indigo-500"
                    title="{{ t('clear_filters') }}" aria-label="{{ t('clear_filters') }}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </a>
            </div>
        </div>
    </div>
</form>
