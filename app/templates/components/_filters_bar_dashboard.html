{# Barra de filtros do dashboard — search, categoria, status, RL, responsável (touch 44px, foco visível) #}
<div class="bento-card">
    <form method="GET" action="{{ url_for(dashboard_endpoint) }}" role="search" aria-label="{{ t('search') if t else 'Filtros' }}">
        <div class="bento-filter-grid">
            <div class="field wide">
                <label for="filter-search">{{ t('search') }}</label>
                <input id="filter-search" type="text" name="search" value="{{ request.args.get('search', '') }}"
                    placeholder="{{ t('search_placeholder') }}"
                    aria-label="{{ t('search') }}">
            </div>
            <div class="field">
                <label for="filter-categoria">{{ t('category') }}</label>
                <select id="filter-categoria" name="categoria" aria-label="{{ t('category') }}">
                    <option value="">{{ t('all') }}</option>
                    <option value="Projetos" {% if request.args.get('categoria')=='Projetos' %}selected{% endif %}>{{ t('projects') }}</option>
                    <option value="Nao Aplicavel" {% if request.args.get('categoria')=='Nao Aplicavel' %}selected{% endif %}>{{ t('not_applicable') }}</option>
                </select>
            </div>
            <div class="field">
                <label for="filter-status">{{ t('status') }}</label>
                <select id="filter-status" name="status" aria-label="{{ t('status') }}">
                    <option value="">{{ t('all') }}</option>
                    <option value="Aberto" {% if request.args.get('status')=='Aberto' %}selected{% endif %}>{{ t('open') }}</option>
                    <option value="Em Atendimento" {% if request.args.get('status')=='Em Atendimento' %}selected{% endif %}>{{ t('in_progress') }}</option>
                    <option value="Concluído" {% if request.args.get('status')=='Concluído' %}selected{% endif %}>{{ t('completed') }}</option>
                    <option value="Cancelado" {% if request.args.get('status')=='Cancelado' %}selected{% endif %}>{{ t('cancelled') }}</option>
                </select>
            </div>
            <div class="field">
                <label for="filter-rl">{{ t('rl_short') }}</label>
                <input id="filter-rl" type="text" name="rl_codigo"
                    value="{{ request.args.get('rl_codigo', '') }}"
                    placeholder="{{ t('rl_code_example') if t else 'Ex.: 045' }}"
                    aria-label="{{ t('rl_short') }}" />
            </div>
            <div class="field">
                <label for="filter-responsavel">{{ t('assigned_to') }}</label>
                <select id="filter-responsavel" name="responsavel" aria-label="{{ t('assigned_to') }}">
                    <option value="">{{ t('all') }}</option>
                    {% for nome in lista_responsaveis %}
                    <option value="{{ nome }}" {% if request.args.get('responsavel')==nome %}selected{% endif %}>{{ nome }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="actions">
                <button type="submit" class="bento-btn-primary">{{ t('filter') }}</button>
                <a href="{{ url_for(dashboard_endpoint) }}" class="bento-btn-ghost" title="{{ t('clear_filters') }}" aria-label="{{ t('clear_filters') }}">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </a>
            </div>
        </div>
    </form>
</div>
