{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto mt-12 px-4">
    <div class="bento-card" style="background:var(--color-status-open-bg); border-color:#fde68a; text-align:center;">
        <div class="bento-chip-icon" style="width:56px; height:56px; margin:0 auto 16px; background:#fde68a; color:#b45309;">
            <svg width="28" height="28" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>
        <h1 class="font-display" style="font-size:1.3rem; font-weight:800; margin-bottom:8px;">Índice do banco em construção</h1>
        <p style="color:var(--color-text-muted); margin-bottom:8px;">O Firestore está finalizando um índice necessário para o dashboard. Isso costuma levar alguns minutos.</p>
        <p style="font-size:13px; color:var(--color-surface-muted); margin-bottom:20px;">Esta página será recarregada automaticamente em <span id="countdown">30</span>s.</p>
        <a href="{{ url_for(dashboard_endpoint) }}" class="bento-btn-primary" style="display:inline-flex;">
            Atualizar agora
        </a>
    </div>
</div>
<script>
(function () {
    var segundos = 30;
    var el = document.getElementById('countdown');
    var timer = setInterval(function () {
        segundos -= 1;
        if (el) el.textContent = String(segundos);
        if (segundos <= 0) {
            clearInterval(timer);
            window.location.reload();
        }
    }, 1000);
})();
</script>
{% endblock %}
